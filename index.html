<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>COLA ROLL</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1f1f4;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      background: #f1f1f4;
    }

    #workLabel {
      position: fixed;
      left: env(safe-area-inset-left, 0px);
      top: env(safe-area-inset-top, 0px);
      padding: 10px 12px;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(40, 40, 46, 0.45);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>
  <div id="workLabel">コーラすごろく / Cola roll</div>

  <script src="./codea-lite.js?v=canvas-particles-clean-0720"></script>
  <script src="./sketch.js?v=canvas-particles-clean-0720"></script>
  <script>
    CodeaLite.start("screen");
  </script>
</body>
</html>
